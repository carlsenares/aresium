services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: aresium
      POSTGRES_PASSWORD: aresium
      POSTGRES_DB: aresium
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - aresium_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aresium"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  aresium_pgdata:
