<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Aresium — Personal Finance</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.js"></script>
<style>
:root {
  --exp: #FF2D4B; --bal: #2E8BFF;
  --r-card: 16px; --r-row: 11px;
  --blur: 22px;
  --mono: "JetBrains Mono", ui-monospace, monospace;
  --sans: "Space Grotesk", system-ui, sans-serif;
}
html[data-theme="dark"] {
  --bg: #050507;
  --card: rgba(15,16,21,0.55); --card-2: rgba(26,28,35,0.62);
  --line-soft: rgba(255,255,255,0.08); --grid: rgba(255,255,255,0.05); --guide: rgba(255,255,255,0.22);
  --ink: #f6f7fb; --ink-2: #b3b9c6; --ink-3: #6b7280;
  --hover: rgba(255,255,255,0.05); --shadow: 0 30px 70px -26px rgba(0,0,0,0.92);
  --mark: #f6f7fb;
  --edge: rgba(255,255,255,0.10);
  --glass-edge: linear-gradient(135deg, rgba(255,255,255,0.24), rgba(255,255,255,0.04) 30%, rgba(255,70,92,0.07) 68%, rgba(255,255,255,0.03));
  --spec: radial-gradient(130% 90% at 0% 0%, rgba(255,255,255,0.07), transparent 46%);
  --glow1: radial-gradient(72% 52% at 50% -12%, rgba(216,26,52,0.36), transparent 60%);
  --glow2: radial-gradient(58% 50% at 90% 120%, rgba(150,14,38,0.24), transparent 56%);
}
html[data-theme="light"] {
  --bg: #ecedf2;
  --card: rgba(255,255,255,0.74); --card-2: rgba(247,248,251,0.82);
  --line-soft: rgba(15,20,40,0.10); --grid: rgba(15,20,40,0.07); --guide: rgba(15,20,40,0.28);
  --ink: #0a0c12; --ink-2: #525a69; --ink-3: #88919f;
  --hover: rgba(15,20,40,0.045); --shadow: 0 24px 50px -24px rgba(15,22,40,0.26);
  --mark: #0a0c12;
  --edge: rgba(255,255,255,0.85);
  --glass-edge: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(255,255,255,0.4) 35%, rgba(216,26,52,0.10) 74%, rgba(255,255,255,0.3));
  --spec: radial-gradient(130% 90% at 0% 0%, rgba(255,255,255,0.6), transparent 46%);
  --glow1: radial-gradient(72% 52% at 50% -12%, rgba(216,26,52,0.13), transparent 60%);
  --glow2: radial-gradient(58% 50% at 90% 120%, rgba(216,26,52,0.07), transparent 56%);
}
html[data-theme="red"] {
  --bg: #5e0818;
  --card: rgba(255,255,255,0.15); --card-2: rgba(255,255,255,0.2);
  --line-soft: rgba(255,255,255,0.26); --grid: rgba(255,255,255,0.16); --guide: rgba(255,255,255,0.55);
  --ink: #fff5f5; --ink-2: rgba(255,236,238,0.86); --ink-3: rgba(255,214,218,0.6);
  --hover: rgba(255,255,255,0.14); --shadow: 0 34px 84px -28px rgba(30,0,6,0.78);
  --mark: #ffffff;
  --edge: rgba(255,255,255,0.32);
  --glass-edge: linear-gradient(135deg, rgba(255,255,255,0.68), rgba(255,255,255,0.14) 36%, rgba(255,255,255,0.05) 70%, rgba(255,255,255,0.22));
  --spec: radial-gradient(130% 90% at 0% 0%, rgba(255,255,255,0.22), transparent 50%);
  --glow1: linear-gradient(118deg, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0.02) 16%, rgba(255,255,255,0) 34%);
  --glow2: radial-gradient(58% 26% at 50% 1%, rgba(255,120,135,0.15), transparent 60%);
}
* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body {
  font-family: var(--sans); background: var(--bg); color: var(--ink);
  -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
  position: relative; overflow-x: hidden;
}
body::before, body::after { content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0; }
body::before { background: var(--glow1); }
body::after { background: var(--glow2); }
html[data-theme="red"] body {
  background:
    radial-gradient(62% 32% at 50% -16%, rgba(196,44,64,0.30), rgba(0,0,0,0) 56%),
    radial-gradient(72% 56% at 86% 122%, rgba(34,1,8,0.85), rgba(0,0,0,0) 56%),
    linear-gradient(176deg, #6c0a1c 0%, #470611 52%, #240307 100%);
  background-attachment: fixed;
}
#root { height: 100%; position: relative; z-index: 1; }
.app {
  height: 100%; display: flex; flex-direction: column;
  max-width: 1320px; margin: 0 auto; padding: 22px 26px 26px; position: relative; z-index: 1;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

/* ---------- top bar ---------- */
.topbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 20px; }
.brand { display: flex; align-items: center; gap: 14px; min-width: 0; }
.brand-btn { display: flex; align-items: center; gap: 13px; background: none; padding: 4px 6px 4px 0; cursor: pointer; border-radius: 10px; transition: transform .18s ease, filter .2s ease; }
.brand-btn:hover { transform: translateY(-1px); filter: drop-shadow(0 4px 14px rgba(255,45,75,0.45)); }
.brand-btn:active { transform: translateY(0) scale(0.98); }
.brand-mark { color: var(--mark); display: flex; }
.brand-name { font-weight: 700; font-size: 19px; letter-spacing: -0.03em; }
.crumbs { display: flex; align-items: center; flex-wrap: wrap; gap: 2px; padding-left: 12px; margin-left: 4px; border-left: 1px solid var(--line-soft); }
.crumb-wrap { display: inline-flex; align-items: center; }
.crumb-sep { color: var(--ink-3); margin: 0 7px; font-size: 13px; }
.crumb { font-size: 13.5px; font-weight: 600; padding: 3px 2px; }
.crumb-link { color: var(--ink-2); transition: color .2s; }
.crumb-link:hover { color: var(--ink); }
.crumb-cur { color: var(--ink); }
.actions { display: flex; align-items: center; gap: 10px; }
.btn-back, .btn-theme {
  display: inline-flex; align-items: center; gap: 7px; height: 38px;
  border: 1px solid var(--line-soft); border-radius: 12px; background: var(--card);
  -webkit-backdrop-filter: blur(14px) saturate(140%); backdrop-filter: blur(14px) saturate(140%);
  color: var(--ink-2); font-weight: 600; font-size: 13.5px; transition: all .2s;
}
.btn-back { padding: 0 14px 0 11px; }
.btn-theme { width: 38px; justify-content: center; }
.btn-back:hover:not(:disabled), .btn-theme:hover { color: var(--ink); border-color: var(--ink-3); background: var(--card-2); }
.btn-back:disabled { opacity: .4; cursor: default; }

/* ---------- grid ---------- */
.grid { flex: 1; display: grid; grid-template-columns: 62% 38%; gap: 20px; min-height: 0; }
.chart-card, .side-card {
  position: relative;
  border: 1px solid transparent; border-radius: var(--r-card);
  background: linear-gradient(var(--card), var(--card)) padding-box, var(--glass-edge) border-box;
  -webkit-backdrop-filter: blur(26px) saturate(150%);
  backdrop-filter: blur(26px) saturate(150%);
  box-shadow: var(--shadow), inset 0 1px 0 var(--edge);
  min-height: 0; display: flex; flex-direction: column;
}
.chart-card::before, .side-card::before {
  content: ""; position: absolute; inset: 0; border-radius: inherit; pointer-events: none;
  background: var(--spec); z-index: 0;
}
.chart-card::after, .side-card::after {
  content: ""; position: absolute; inset: 0; border-radius: inherit; pointer-events: none; z-index: 0;
  background: linear-gradient(122deg, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0.02) 14%, rgba(255,255,255,0) 30%);
}
.chart-card > *, .side-card > * { position: relative; z-index: 1; }
.chart-card { padding: 22px 22px 14px; }
.chart-card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 8px; }
.chart-titles { flex: 1 1 auto; min-width: 0; }
.chart-title { margin: 0; font-size: 23px; font-weight: 700; letter-spacing: -0.035em; display: flex; align-items: center; gap: 11px; }
.chart-title-ic { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; }
.chart-title-ic svg { width: 22px; height: 22px; stroke-width: 2; }
.chart-sub { margin: 5px 0 0; font-size: 13px; color: var(--ink-3); font-weight: 500; letter-spacing: -0.01em; }
.legend { display: flex; gap: 14px; padding-top: 4px; flex: none; }
.legend-item { display: inline-flex; align-items: center; gap: 7px; font-size: 12.5px; font-weight: 600; color: var(--ink-2); white-space: nowrap; }
.dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
.chart-host { flex: 1; min-height: 0; position: relative; }
.chart-canvas { position: absolute; inset: 0; }

/* axes */
.axis-lbl { fill: var(--ink-3); font-size: 11px; font-family: var(--mono); font-weight: 500; }
.axis-title { fill: var(--ink-3); font-size: 11px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }

/* tooltip */
.chart-tip {
  position: absolute; transform: translateX(-50%); pointer-events: none;
  background: var(--card-2); border: 1px solid var(--line-soft); border-radius: 9px;
  padding: 9px 11px; box-shadow: var(--shadow); min-width: 132px; z-index: 5;
}
.chart-tip-x { font-size: 11px; font-weight: 700; color: var(--ink-3); margin-bottom: 6px; font-family: var(--mono); }
.chart-tip-row { display: flex; align-items: center; gap: 7px; font-size: 12.5px; padding: 1px 0; }
.chart-tip-name { color: var(--ink-2); font-weight: 600; }
.chart-tip-val { margin-left: auto; font-family: var(--mono); font-weight: 600; color: var(--ink); }

/* ---------- side panel ---------- */
.side-card { overflow: hidden; }
/* Motion uses transform only (opacity stays 1) so content is always visible even
   where the compositor clock is frozen; live clocks still get the slide. */
.panel { display: flex; flex-direction: column; min-height: 0; flex: 1;
  transition: transform .46s cubic-bezier(.22,.7,.25,1); }
.panel.fwd { transform: translateX(16px); }
.panel.back { transform: translateX(-16px); }
.panel.in { transform: none; }

.reveal { transform: translateY(7px); transition: transform .4s cubic-bezier(.22,.7,.25,1); }
.reveal.in { transform: none; }
@media (prefers-reduced-motion: reduce) { .panel, .reveal { transition: none; transform: none; } }

.panel-head { padding: 22px 22px 14px; border-bottom: 1px solid var(--line-soft); }
.panel-kicker { font-size: 11px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-3); }
.panel-title { font-size: 18px; font-weight: 700; letter-spacing: -0.03em; margin-top: 3px; }
.panel-total { font-family: var(--sans); font-size: 25px; font-weight: 700; letter-spacing: -0.035em; margin-top: 10px; color: var(--ink); font-variant-numeric: tabular-nums; }
.panel-total-cap { font-family: var(--sans); font-size: 12px; font-weight: 500; color: var(--ink-3); margin-left: 8px; letter-spacing: 0; }

.panel-list { flex: 1; overflow-y: auto; padding: 8px 12px 14px; scrollbar-width: thin; scrollbar-color: var(--line-soft) transparent; }
.panel-list::-webkit-scrollbar { width: 8px; }
.panel-list::-webkit-scrollbar-thumb { background: var(--line-soft); border-radius: 8px; }
.panel-empty { padding: 30px; text-align: center; color: var(--ink-3); font-size: 14px; }

.cat-row {
  width: 100%; display: grid; grid-template-columns: 38px 1fr auto 14px; align-items: center; gap: 12px;
  padding: 11px 12px; border-radius: var(--r-row); text-align: left; transition: background .16s;
}
.cat-row:hover { background: var(--hover); }
.cat-icon { width: 38px; height: 38px; border-radius: 9px; display: flex; align-items: center; justify-content: center; }
.cat-icon svg { width: 19px; height: 19px; stroke-width: 2; }
.cat-main { min-width: 0; display: flex; flex-direction: column; gap: 7px; }
.cat-name { font-size: 14.5px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -0.015em; }
.cat-bar { height: 3px; border-radius: 3px; background: var(--grid); overflow: hidden; }
.cat-bar-fill { display: block; height: 100%; border-radius: 3px; transition: width .5s cubic-bezier(.22,.7,.25,1); }
.cat-amt { font-family: var(--mono); font-size: 13.5px; font-weight: 600; color: var(--ink); }
.cat-chev { color: var(--ink-3); font-size: 18px; transition: transform .16s, color .16s; }
.cat-row:hover .cat-chev { color: var(--ink-2); transform: translateX(2px); }

.txn-row {
  display: grid; grid-template-columns: 38px 1fr auto; align-items: center; gap: 12px;
  padding: 11px 12px; border-radius: var(--r-row);
}
.txn-day { width: 38px; height: 38px; border-radius: 9px; background: var(--card-2); border: 1px solid var(--line-soft); display: flex; align-items: center; justify-content: center; }
.txn-day-n { font-family: var(--mono); font-size: 15px; font-weight: 600; color: var(--ink-2); }
.txn-main { min-width: 0; display: flex; flex-direction: column; gap: 2px; }
.txn-place { font-size: 14.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -0.015em; }
.txn-city { font-size: 12.5px; color: var(--ink-3); font-weight: 500; }
.txn-amt { font-family: var(--mono); font-size: 14px; font-weight: 600; color: var(--exp); }
.logo { display: block; }

/* ---------- red “paint” mode ---------- */
.paint {
  position: fixed; left: 0; right: 0; top: 0; height: 176vh; z-index: 60; pointer-events: none;
  transform: translateY(-178vh);
  transition: transform 1.45s cubic-bezier(.6,0,.32,1); will-change: transform;
  --pc: #5c0816;
  background:
    radial-gradient(58% 24% at 32% 12%, rgba(230,80,100,0.24), transparent 60%),
    linear-gradient(176deg, #780c1f 0%, #530713 50%, #2a0309 100%);
}
.paint.go { transform: translateY(102vh); }
/* Leading edge as flowing paint: wide, soft, overlapping bulbous drips (not thin spikes).
   Big radii + feathered stops (46%→72%) make neighbours merge into a continuous gooey
   lip, and a slight blur gives it a liquid surface. Uneven lengths read as real drips. */
.paint::after, .paint::before { content: ""; position: absolute; left: 0; right: 0; background-repeat: no-repeat; }
.paint::after {
  top: 100%; height: 138px; filter: blur(1.5px);
  background-image:
    radial-gradient(27px 104px at 5% 0,  var(--pc) 46%, transparent 72%),
    radial-gradient(20px 58px  at 13% 0, var(--pc) 46%, transparent 72%),
    radial-gradient(31px 128px at 22% 0, var(--pc) 46%, transparent 72%),
    radial-gradient(22px 74px  at 32% 0, var(--pc) 46%, transparent 72%),
    radial-gradient(28px 100px at 43% 0, var(--pc) 46%, transparent 72%),
    radial-gradient(19px 54px  at 52% 0, var(--pc) 46%, transparent 72%),
    radial-gradient(32px 132px at 63% 0, var(--pc) 46%, transparent 72%),
    radial-gradient(21px 66px  at 73% 0, var(--pc) 46%, transparent 72%),
    radial-gradient(28px 110px at 84% 0, var(--pc) 46%, transparent 72%),
    radial-gradient(20px 60px  at 94% 0, var(--pc) 46%, transparent 72%);
}
.paint::before {
  bottom: 100%; height: 110px; filter: blur(1.5px);
  background-image:
    radial-gradient(24px 88px  at 10% 100%, var(--pc) 46%, transparent 72%),
    radial-gradient(30px 108px at 22% 100%, var(--pc) 46%, transparent 72%),
    radial-gradient(20px 56px  at 33% 100%, var(--pc) 46%, transparent 72%),
    radial-gradient(27px 96px  at 45% 100%, var(--pc) 46%, transparent 72%),
    radial-gradient(21px 64px  at 57% 100%, var(--pc) 46%, transparent 72%),
    radial-gradient(31px 116px at 69% 100%, var(--pc) 46%, transparent 72%),
    radial-gradient(20px 58px  at 80% 100%, var(--pc) 46%, transparent 72%),
    radial-gradient(26px 92px  at 91% 100%, var(--pc) 46%, transparent 72%);
}

.aresium-band { flex: none; height: 17vh; min-height: 96px; display: flex; align-items: flex-end; justify-content: center; overflow: hidden; margin-top: 4px; user-select: none; }
.aresium-word {
  display: flex; justify-content: space-between; width: 100%; padding: 0 4px; line-height: 0.72;
  font-weight: 700; letter-spacing: -0.015em; font-size: clamp(64px, 15.4vw, 252px);
  background: linear-gradient(177deg, rgba(255,255,255,0.46) 0%, rgba(255,255,255,0.16) 55%, rgba(255,255,255,0.05) 100%);
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent;
}
.aresium-word span { display: block; }

/* ---------- responsive / mobile ---------- */
@media (max-width: 860px) {
  .app { padding: 14px 14px 16px; height: auto; min-height: 100%; }
  .topbar { flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }
  .brand { width: 100%; }
  .crumbs { padding-left: 0; margin-left: 0; border-left: none; width: 100%; order: 3; padding-top: 4px; }
  .grid { display: flex; flex-direction: column; gap: 14px; }
  .chart-card { padding: 18px 16px 10px; }
  .chart-host { height: 44vh; min-height: 280px; flex: none; }
  .chart-title { font-size: 20px; }
  .side-card { min-height: 340px; }
  .chart-card-head { flex-wrap: wrap; }
  .aresium-band { height: 11vh; min-height: 64px; }
}
@media (max-width: 420px) {
  .brand-name { font-size: 17px; }
  .btn-back span { display: none; }
  .btn-back { width: 38px; justify-content: center; padding: 0; }
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="app/data.js"></script>
